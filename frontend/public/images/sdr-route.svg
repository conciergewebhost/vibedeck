<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" role="img" aria-label="Surveillance detection route diagram">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#b5402e" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- route: four legs, dashed, like a pencilled-in path -->
  <polyline points="45,155 130,85 230,145 320,75 388,120"
    fill="none" stroke="#b5402e" stroke-width="1.6" stroke-dasharray="5 4"
    marker-end="url(#arrow)"/>

  <!-- nodes -->
  <g fill="none" stroke="#8f7d54" stroke-width="1.6">
    <circle cx="45" cy="155" r="5"/>
    <circle cx="130" cy="85" r="5"/>
    <circle cx="230" cy="145" r="5"/>
    <circle cx="320" cy="75" r="5"/>
    <rect x="381" y="113" width="14" height="14"/>
  </g>

  <!-- labels -->
  <g fill="#8f7d54" font-family="'Courier New', monospace" font-size="11" letter-spacing="1">
    <text x="45" y="178" text-anchor="middle">HOME</text>
    <text x="130" y="73" text-anchor="middle">MARKET</text>
    <text x="230" y="167" text-anchor="middle">CAFÉ</text>
    <text x="320" y="63" text-anchor="middle">BRIDGE</text>
    <text x="388" y="150" text-anchor="middle">DROP</text>
  </g>

  <!-- observation point -->
  <rect x="205" y="120" width="50" height="46" fill="none" stroke="#b5402e"
    stroke-width="1" stroke-dasharray="3 3"/>
  <text x="230" y="114" text-anchor="middle" fill="#b5402e"
    font-family="'Arial Narrow', sans-serif" font-size="9" letter-spacing="2">OBSERVED</text>
</svg>
