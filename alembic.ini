# ── Alembic configuration ─────────────────────────────────────
# The database URL is NOT set here — it is injected at runtime from
# the application settings (.env DATABASE_URL) in migrations/env.py.
# Run alembic from the repo root.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# Migration filenames get a date prefix for readable ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
